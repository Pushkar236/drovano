packages:
  - apps/*
  - packages/*
  - packages/modules/*
  - scripts

# Dependency build scripts are blocked by default (supply-chain posture,
# SECURITY.md); only the allowlisted packages below may run them.
onlyBuiltDependencies:
  - esbuild

# Single source of truth for dependency versions across the workspace
# (ADR-0001). Exact pins; Renovate proposes updates. drizzle-orm is pinned
# to 0.45.x per ADR-0006 until 1.0 GA.
