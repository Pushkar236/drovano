# CI quality gate (CONTRIBUTING.md): build + lint + typecheck + tests must
# be green to merge. There is no override path for convenience.
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, typecheck, docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm turbo run typecheck
      - run: pnpm turbo boundaries
      - run: pnpm turbo run build
      - run: pnpm check-bundle
      - run: pnpm verify-docs

  test:
    name: Tests (real Postgres)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Integration tests run against ephemeral Postgres 18 containers
      # (Testcontainers); the ubuntu runner ships a Docker daemon.
      - run: pnpm turbo run test

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Pinned gitleaks scanning the FULL history every run — the action's
      # event-range logic breaks on root-commit pushes and partial ranges.
      - name: Run gitleaks (full history)
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz | tar -xz gitleaks
          ./gitleaks git --redact --no-banner --exit-code=1 .

  deploy:
    name: Deploy API (Render)
    # Only green main builds reach production — CI is the deploy gate.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [quality, test, secrets]
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-api
      cancel-in-progress: false
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          if [ -z "$RENDER_API_KEY" ]; then
            echo "RENDER_API_KEY secret not set — skipping deploy (no-op until provisioned)."
            exit 0
          fi
          curl -sSf -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{}' \
            https://api.render.com/v1/services/srv-d96ek36q1p3s73c0qufg/deploys
